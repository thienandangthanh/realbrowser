interface:
  display_name: "Realbrowser"
  short_description: "Fast local real Chrome automation with profiles, named sessions, isolated mode, console logs, and network capture"
  default_prompt: "Use $realbrowser to find/select existing debuggable tabs before opening duplicates, use sessions plus find-tab --all-sessions when multiple profiles or anonymous windows may exist, let unique select-tab matches activate the current browser context, use active-session/sessions to reuse that context for plain follow-up commands, list/select browser profiles when login state matters, use --session <name> for long-lived or anonymous contexts, use --anonymous for Chrome DevTools MCP isolated browser state, open URLs in the requested profile with --select before inspecting authenticated pages, use capture-console --out for render or console-log bugs, use capture-network for network/performance checks, observe the page, take an efficient snapshot only when refs are needed, use default normalized screenshots unless exact pixels require --raw-size, avoid restarting or detaching real signed-in profile sessions because Chrome may ask for remote-debugging approval again, detach named anonymous sessions when finished, switch to verbose/raw output only when requested, and verify the UI in the user's real browser."

policy:
  allow_implicit_invocation: true
