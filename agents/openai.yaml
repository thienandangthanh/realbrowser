interface:
  display_name: "Realbrowser"
  short_description: "Fast local real Chrome automation with profiles, named sessions, isolated mode, console logs, and network capture"
  default_prompt: "Use $realbrowser for local Chrome automation. Start with SKILL.md only and follow the generic browser inspection loop: classify scope, acquire one stable target, verify cheaply with URL/title/ready state/visible text, preserve inspection state when practical, choose the smallest reader, refine boundaries, then report with context. Search existing tabs with targeted find-tab --all-sessions queries when the prompt implies current/existing/profile/anonymous state, treat profile selection as setup, and after a real-profile endpoint session exists continue with plain session/handle commands and omit --profile unless switching profiles. Keep signed-in profile work no-focus by reusing existing endpoint tabs plus goto when possible; profile app launches are blocked by default on desktop OSes unless visual handoff is explicit with --front or focus risk is accepted with --best-effort-background. Use the reader ladder: tiny js for URL/title/state, observe for bounded visible sanity checks, snapshot-aria for controls/forms, extract-items plus selector-scoped records for repeated/lazy/nested content, snapshot --efficient for exact refs, screenshots for visual/media/viewport evidence, and console/network commands for debug evidence. Keep large output in artifacts, redact or summarize secret-bearing extracted content, and treat selectors such as article/cards/rows as hypotheses until root and direct-child boundaries are confirmed. A named profile/current-tab request permits inspection only within the requested target; ask before sends, submits, purchases, deletes, account/security changes, permission grants, or broad sensitive access. For console-copy requests select the exact tab then paste DevTools-style console lines without mixing tabs. Use device-screenshots for exact desktop/tablet/mobile PNG captures, use full-screenshot for complete page/internal-scroll captures, open references only for profiles, screenshots, debugging, or full command syntax, and inspect screenshots before finalizing."

policy:
  allow_implicit_invocation: true
