interface:
  display_name: "Realbrowser"
  short_description: "Fast local real Chrome automation with profiles, named sessions, isolated mode, console logs, and network capture"
  default_prompt: "Use $realbrowser for local Chrome automation. Start with SKILL.md only, use the host OS wrapper/path, search existing tabs with find-tab --all-sessions when the prompt implies a current/existing/profile/anonymous session, choose anonymous/session/profile based on whether login state matters, keep real signed-in profile opens in the background unless visual handoff is explicit, cap routine reads, use snapshots only when refs are needed, and for console-copy requests select the exact tab then paste DevTools-style console lines without mixing tabs. Use device-screenshots for exact desktop/tablet/mobile PNG captures, use full-screenshot for complete page/internal-scroll captures, keep large output in artifacts, open references only for profiles, screenshots, debugging, or full command syntax, and inspect screenshots before finalizing."

policy:
  allow_implicit_invocation: true
