interface:
  display_name: "Realbrowser"
  short_description: "Fast local real Chrome automation with profiles, named sessions, isolated mode, console logs, and network capture"
  default_prompt: "Use $realbrowser for local Chrome automation. Start with SKILL.md only, choose anonymous/session/profile based on whether login state matters, cap routine reads, use snapshots only when refs are needed, use device-screenshots for exact desktop/tablet/mobile PNG captures, keep large output in artifacts, open references only for profiles, screenshots, debugging, or full command syntax, and inspect screenshots before finalizing."

policy:
  allow_implicit_invocation: true
