interface:
  display_name: "Realbrowser"
  short_description: "Fast local real Chrome automation with profiles, named sessions, isolated mode, console logs, and network capture"
  default_prompt: "Use $realbrowser for local Chrome automation. Start with SKILL.md only, classify the scope as current/existing tab, signed-in profile, anonymous public page, console/network debug, screenshot, form interaction, or repeated-content extraction, then attach with the least disruptive matching path. Search existing tabs with targeted find-tab --all-sessions queries when the prompt implies current/existing/profile/anonymous state, treat profile selection as setup, and after a real-profile endpoint session exists continue with plain session/handle commands and omit --profile unless switching profiles. Keep signed-in profile work no-focus by reusing existing endpoint tabs plus goto when possible; profile app launches are blocked by default on desktop OSes unless visual handoff is explicit with --front or focus risk is accepted with --best-effort-background. Verify the target with a tiny URL/title/visible-text read, cap routine reads, keep large output in artifacts, redact or summarize secret-bearing extracted content, and use extract-items/selector-scoped records before broad snapshots for feeds, chats, search results, dashboards, tables, or nested lists. A named profile/current-tab request permits inspection only within the requested target; ask before sends, submits, purchases, deletes, account/security changes, permission grants, or broad sensitive access. For console-copy requests select the exact tab then paste DevTools-style console lines without mixing tabs. Use device-screenshots for exact desktop/tablet/mobile PNG captures, use full-screenshot for complete page/internal-scroll captures, open references only for profiles, screenshots, debugging, or full command syntax, and inspect screenshots before finalizing."

policy:
  allow_implicit_invocation: true
